name: "Bug report"
description: "Report a bug to help us improve Lightory."
title: "[Bug]: "
labels: ["type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Describe the bug"
      description: "A clear and concise description of what the bug is."
      placeholder: "e.g., Characters freeze after switching terminals."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to reproduce"
      description: "List exact steps to reproduce the behavior."
      placeholder: |
        1. Start Lightory
        2. Open the browser app
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      description: "What happens instead? Include any error messages."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots / GIFs"
      description: "If applicable, add screenshots or screen recordings. For agent tracking issues, include a screenshot of the Debug View from Settings. Note: paths may contain your username; redact anything sensitive before posting."

  - type: input
    id: browser-version
    attributes:
      label: "Browser version"
      description: "Paste the browser name and version used with the local web UI."
      placeholder: "e.g., Chrome 147.0.7727.15"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: "Provider CLI version"
      description: "Paste the Codex or OpenCode CLI version you used."
      placeholder: "e.g., codex --version or opencode --version"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - Windows
        - macOS
        - Linux
        - WSL2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: "Paste relevant terminal or browser-console output. Search for lines containing `[Lightory]`. Note: logs may contain file paths with your username; redact anything sensitive before posting."
      render: shell
