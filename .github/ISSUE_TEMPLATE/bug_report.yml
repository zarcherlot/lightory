name: "Bug report"
description: "Report a bug to help us improve Pixel Agents."
title: "[Bug]: "
labels: ["type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Describe the bug"
      description: "A clear and concise description of what the bug is."
      placeholder: "e.g., Characters freeze after switching terminals."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to reproduce"
      description: "List exact steps to reproduce the behavior."
      placeholder: |
        1. Open Pixel Agents panel
        2. Click '+ Agent'
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      description: "What happens instead? Include any error messages."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots / GIFs"
      description: "If applicable, add screenshots or screen recordings. For agent tracking issues (stuck on idle, not spawning), include a screenshot of the **Debug View**: in the Pixel Agents panel, click the gear icon (Settings) and toggle Debug View. This shows JSONL connection status, lines parsed, and file paths. **Note:** paths may contain your username -- redact anything sensitive before posting."

  - type: input
    id: browser-version
    attributes:
      label: "Browser version"
      description: "Paste the browser name and version used with the local web UI."
      placeholder: "e.g., Chrome 147.0.7727.15"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: "Claude Code CLI version"
      description: "Run `claude --version` in your terminal."
      placeholder: "e.g., 2.1.78"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - Windows
        - macOS
        - Linux
        - WSL2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: "If running from source (F5), open **View > Debug Console** and paste any lines containing `[Pixel Agents]`. Otherwise, open **Help > Toggle Developer Tools > Console** and paste relevant output. **Note:** logs may contain file paths with your username -- redact anything sensitive before posting."
      render: shell
